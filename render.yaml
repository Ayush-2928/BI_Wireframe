services:
  - type: web
    name: power-bi-wireframe-api
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
